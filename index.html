<script type="module">
import React, { useState, useRef, useCallback, useEffect, useMemo } from "react";
import { createRoot } from "react-dom/client";
import { motion, AnimatePresence, useMotionValue, animate } from "framer-motion";
import {
  Zap, Plus, X, Upload, Play, RotateCcw, GripVertical,
  Radio, Activity, Target, Mic2, Shuffle, Maximize2,
  Pencil, Check, Volume2, VolumeX, Download,
  ArrowUp, ArrowDown, Save, Trash2, Archive,
} from "lucide-react";

const h = React.createElement;

/* ============================================================================
 * SOUND ENGINE (Web Audio API — Cyber-Athletic SFX)
 *   Events:
 *     tick    : ドラムが1コマ進むカチッという高域ブリップ
 *     spin    : ドラム回転中の低域ランブル + 帯域掃引ノイズ
 *     stop    : 停止時の重低音サブ + 高域スナップ
 *     impact  : Shockwave 発動時のサブブーム + ホワイトノイズクラッシュ
 *     fanfare : 最終確定時のアルペジオ + ネオンパッド
 * ========================================================================= */
let _audioCtx = null;
let _master = null;
let _muted = false;

const _getAudio = () => {
  if (typeof window === "undefined") return null;
  const AC = window.AudioContext || window.webkitAudioContext;
  if (!AC) return null;
  if (!_audioCtx) {
    _audioCtx = new AC();
    _master = _audioCtx.createGain();
    _master.gain.value = _muted ? 0 : 0.5;
    // 軽いリミッター代わりのソフトコンプレッサー
    const comp = _audioCtx.createDynamicsCompressor();
    comp.threshold.value = -12;
    comp.knee.value = 12;
    comp.ratio.value = 4;
    comp.attack.value = 0.003;
    comp.release.value = 0.15;
    _master.connect(comp).connect(_audioCtx.destination);
  }
  if (_audioCtx.state === "suspended") _audioCtx.resume().catch(() => {});
  return { ctx: _audioCtx, master: _master };
};

const setSoundMuted = (m) => {
  _muted = !!m;
  if (_master && _audioCtx) {
    const now = _audioCtx.currentTime;
    _master.gain.cancelScheduledValues(now);
    _master.gain.linearRampToValueAtTime(_muted ? 0 : 0.5, now + 0.05);
  }
};

const _noiseBuffer = (ctx, seconds, decay = false) => {
  const len = Math.floor(ctx.sampleRate * seconds);
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < len; i++) {
    const env = decay ? 1 - i / len : 1;
    data[i] = (Math.random() * 2 - 1) * env;
  }
  return buf;
};

const playSfx = (event) => {
  if (_muted) return;
  const audio = _getAudio();
  if (!audio) return;
  const { ctx, master } = audio;
  const t = ctx.currentTime;

  if (event === "tick") {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "square";
    osc.frequency.setValueAtTime(1500, t);
    osc.frequency.exponentialRampToValueAtTime(650, t + 0.04);
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(0.14, t + 0.004);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.05);
    osc.connect(gain).connect(master);
    osc.start(t); osc.stop(t + 0.06);
    return;
  }

  if (event === "spin") {
    // 帯域掃引ノイズ（シューッという風切り音）
    const src = ctx.createBufferSource();
    src.buffer = _noiseBuffer(ctx, 1.3);
    const bp = ctx.createBiquadFilter();
    bp.type = "bandpass"; bp.Q.value = 7;
    bp.frequency.setValueAtTime(350, t);
    bp.frequency.exponentialRampToValueAtTime(4200, t + 1.1);
    const nGain = ctx.createGain();
    nGain.gain.setValueAtTime(0.0001, t);
    nGain.gain.exponentialRampToValueAtTime(0.22, t + 0.15);
    nGain.gain.exponentialRampToValueAtTime(0.01, t + 1.2);
    src.connect(bp).connect(nGain).connect(master);
    src.start(t); src.stop(t + 1.3);

    // 低域ランブル（唸るエンジン感）
    const osc = ctx.createOscillator();
    const oGain = ctx.createGain();
    osc.type = "sawtooth";
    osc.frequency.setValueAtTime(55, t);
    osc.frequency.exponentialRampToValueAtTime(130, t + 1.0);
    oGain.gain.setValueAtTime(0.0001, t);
    oGain.gain.exponentialRampToValueAtTime(0.16, t + 0.2);
    oGain.gain.exponentialRampToValueAtTime(0.001, t + 1.2);
    osc.connect(oGain).connect(master);
    osc.start(t); osc.stop(t + 1.25);
    return;
  }

  if (event === "stop") {
    // 低域サブ（ドンッ）
    const sub = ctx.createOscillator();
    const subG = ctx.createGain();
    sub.type = "sine";
    sub.frequency.setValueAtTime(220, t);
    sub.frequency.exponentialRampToValueAtTime(42, t + 0.25);
    subG.gain.setValueAtTime(0.0001, t);
    subG.gain.exponentialRampToValueAtTime(0.55, t + 0.008);
    subG.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    sub.connect(subG).connect(master);
    sub.start(t); sub.stop(t + 0.45);

    // 高域スナップ（カシャッ）
    const snap = ctx.createOscillator();
    const snapG = ctx.createGain();
    snap.type = "square";
    snap.frequency.setValueAtTime(980, t);
    snap.frequency.exponentialRampToValueAtTime(420, t + 0.12);
    snapG.gain.setValueAtTime(0.0001, t);
    snapG.gain.exponentialRampToValueAtTime(0.18, t + 0.004);
    snapG.gain.exponentialRampToValueAtTime(0.001, t + 0.17);
    snap.connect(snapG).connect(master);
    snap.start(t); snap.stop(t + 0.2);
    return;
  }

  if (event === "impact") {
    // サブブーム
    const sub = ctx.createOscillator();
    const subG = ctx.createGain();
    sub.type = "sine";
    sub.frequency.setValueAtTime(140, t);
    sub.frequency.exponentialRampToValueAtTime(28, t + 0.55);
    subG.gain.setValueAtTime(0.0001, t);
    subG.gain.exponentialRampToValueAtTime(0.7, t + 0.01);
    subG.gain.exponentialRampToValueAtTime(0.001, t + 0.65);
    sub.connect(subG).connect(master);
    sub.start(t); sub.stop(t + 0.7);

    // ホワイトノイズクラッシュ
    const src = ctx.createBufferSource();
    src.buffer = _noiseBuffer(ctx, 0.5, true);
    const hp = ctx.createBiquadFilter();
    hp.type = "highpass"; hp.frequency.value = 1800;
    const nGain = ctx.createGain();
    nGain.gain.setValueAtTime(0.45, t);
    nGain.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
    src.connect(hp).connect(nGain).connect(master);
    src.start(t);
    return;
  }

  if (event === "fanfare") {
    // ネオンパッド（C メジャー）
    [261.63, 329.63, 392.0, 523.25].forEach((f) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = "triangle";
      o.frequency.setValueAtTime(f, t);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.11, t + 0.25);
      g.gain.setValueAtTime(0.11, t + 1.2);
      g.gain.exponentialRampToValueAtTime(0.001, t + 2.0);
      o.connect(g).connect(master);
      o.start(t); o.stop(t + 2.1);
    });

    // 上昇アルペジオ（sawtooth + lowpass）
    const arp = [
      { f: 523.25, dt: 0.0  },
      { f: 659.25, dt: 0.10 },
      { f: 783.99, dt: 0.20 },
      { f: 1046.5, dt: 0.30 },
      { f: 1318.5, dt: 0.42 },
      { f: 1567.98, dt: 0.54 },
      { f: 2093.0, dt: 0.70 },
    ];
    arp.forEach(({ f, dt }) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      const lp = ctx.createBiquadFilter();
      lp.type = "lowpass"; lp.frequency.value = 4500;
      o.type = "sawtooth";
      o.frequency.setValueAtTime(f, t + dt);
      g.gain.setValueAtTime(0.0001, t + dt);
      g.gain.exponentialRampToValueAtTime(0.2, t + dt + 0.015);
      g.gain.exponentialRampToValueAtTime(0.001, t + dt + 0.45);
      o.connect(lp).connect(g).connect(master);
      o.start(t + dt); o.stop(t + dt + 0.5);
    });

    // 最後にドン
    const sub = ctx.createOscillator();
    const subG = ctx.createGain();
    sub.type = "sine";
    sub.frequency.setValueAtTime(90, t + 0.85);
    sub.frequency.exponentialRampToValueAtTime(35, t + 1.6);
    subG.gain.setValueAtTime(0.0001, t + 0.85);
    subG.gain.exponentialRampToValueAtTime(0.55, t + 0.87);
    subG.gain.exponentialRampToValueAtTime(0.001, t + 1.7);
    sub.connect(subG).connect(master);
    sub.start(t + 0.85); sub.stop(t + 1.75);
    return;
  }
};

const useSoundEngine = () => {
  const play = useCallback((event) => playSfx(event), []);
  return { play };
};

/* ============================================================================
 * LOGIC — ロジック層（プレゼンから完全分離）
 * ========================================================================= */
const shuffleArray = (arr) => {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
};
const generateRanking = (schools) => shuffleArray(schools);

const NEON = {
  cyan:    "#00F0FF",
  magenta: "#FF2E9A",
  yellow:  "#F5FF3D",
  lime:    "#7CFF6B",
};

// crypto.randomUUID() の互換ラッパー（古い環境や非HTTPSでも動く）
const makeId = () => {
  if (typeof crypto !== "undefined" && crypto.randomUUID) return crypto.randomUUID();
  return "id-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 10);
};

/* ============================================================================
 * Persistence (localStorage)
 * ========================================================================= */
const STORAGE_SCHOOLS = "kineticdraft.schools.v2";
const STORAGE_MUTED = "kineticdraft.muted.v1";
const STORAGE_SAVED = "kineticdraft.saved.v1";

const loadSchools = () => {
  if (typeof window === "undefined") return null;
  try {
    const raw = window.localStorage.getItem(STORAGE_SCHOOLS);
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (!Array.isArray(data)) return null;
    return data
      .filter((x) => x && typeof x.name === "string" && x.name.trim())
      .map((x) => ({ id: typeof x.id === "string" ? x.id : makeId(), name: x.name }));
  } catch { return null; }
};

const saveSchools = (list) => {
  if (typeof window === "undefined") return;
  try { window.localStorage.setItem(STORAGE_SCHOOLS, JSON.stringify(list)); } catch {}
};

const loadMuted = () => {
  if (typeof window === "undefined") return false;
  try { return window.localStorage.getItem(STORAGE_MUTED) === "1"; } catch { return false; }
};

const saveMuted = (m) => {
  if (typeof window === "undefined") return;
  try { window.localStorage.setItem(STORAGE_MUTED, m ? "1" : "0"); } catch {}
};

const loadSavedDrafts = () => {
  if (typeof window === "undefined") return [];
  try {
    const raw = window.localStorage.getItem(STORAGE_SAVED);
    if (!raw) return [];
    const data = JSON.parse(raw);
    if (!Array.isArray(data)) return [];
    return data
      .filter((x) => x && typeof x.id === "string" && typeof x.name === "string" && Array.isArray(x.ranking))
      .map((x) => ({
        id: x.id,
        name: x.name,
        createdAt: typeof x.createdAt === "string" ? x.createdAt : new Date().toISOString(),
        ranking: x.ranking.filter((s) => s && typeof s.name === "string").map((s) => ({
          id: typeof s.id === "string" ? s.id : makeId(),
          name: s.name,
        })),
      }));
  } catch { return []; }
};

const saveSavedDrafts = (list) => {
  if (typeof window === "undefined") return;
  try { window.localStorage.setItem(STORAGE_SAVED, JSON.stringify(list)); } catch {}
};

/* ============================================================================
 * CSV Export
 * ========================================================================= */
const _csvEscape = (v) => `"${String(v).replace(/"/g, '""')}"`;
const _csvToBlob = (rows) => {
  const csv = "\uFEFF" + rows.map((r) => r.map(_csvEscape).join(",")).join("\r\n");
  return new Blob([csv], { type: "text/csv;charset=utf-8" });
};
const _sanitizeFile = (s) => String(s || "").replace(/[\/\\:*?"<>|\s]+/g, "_").slice(0, 60) || "draft";
const _downloadBlob = (blob, filename) => {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 2000);
};
const _timeStamp = () => new Date().toISOString().slice(0, 19).replace(/[:T]/g, "-");

const downloadRankingCsv = (ranking, label) => {
  const rows = [["順番", "高校名"]];
  ranking.forEach((s, i) => rows.push([String(i + 1), s.name]));
  _downloadBlob(_csvToBlob(rows), `${_sanitizeFile(label || "presentation-order")}-${_timeStamp()}.csv`);
};

const downloadAllSavedCsv = (savedList) => {
  const rows = [["大会名", "順番", "高校名", "保存日時"]];
  savedList.forEach((rec) => {
    const dt = new Date(rec.createdAt);
    const dtStr = isNaN(dt.getTime()) ? rec.createdAt : dt.toLocaleString("ja-JP");
    rec.ranking.forEach((s, i) => {
      rows.push([rec.name, String(i + 1), s.name, dtStr]);
    });
  });
  _downloadBlob(_csvToBlob(rows), `all-drafts-${_timeStamp()}.csv`);
};

const Readout = ({ icon, label, value, pulse }) =>

/* ============================================================================
 * School Registry
 * ========================================================================= */
const SchoolRegistry = ({ schools, setSchools, disabled }) => {
  const [input, setInput] = useState("");
  const [bulk, setBulk] = useState("");
  const [showBulk, setShowBulk] = useState(false);
  const [dragIdx, setDragIdx] = useState(null);
  const [hoverIdx, setHoverIdx] = useState(null);
  const [editingId, setEditingId] = useState(null);
  const [editValue, setEditValue] = useState("");

  const addOne = () => {
    const name = input.trim();
    if (!name) return;
    if (schools.some((s) => s.name === name)) { setInput(""); return; }
    setSchools([...schools, { id: makeId(), name }]);
    setInput("");
  };

  const addBulk = () => {
    const lines = bulk.split(/\r?\n|,|、|\t/).map((s) => s.trim()).filter(Boolean);
    const seen = new Set(schools.map((s) => s.name));
    const fresh = [];
    lines.forEach((n) => {
      if (!seen.has(n)) { seen.add(n); fresh.push({ id: makeId(), name: n }); }
    });
    setSchools([...schools, ...fresh]);
    setBulk("");
    setShowBulk(false);
  };

  const remove = (id) => setSchools(schools.filter((s) => s.id !== id));

  const move = (id, dir) => {
    const idx = schools.findIndex((s) => s.id === id);
    if (idx < 0) return;
    const next = idx + dir;
    if (next < 0 || next >= schools.length) return;
    const arr = [...schools];
    [arr[idx], arr[next]] = [arr[next], arr[idx]];
    setSchools(arr);
  };

  const startEdit = (s) => {
    if (disabled) return;
    setEditingId(s.id);
    setEditValue(s.name);
  };
  const cancelEdit = () => { setEditingId(null); setEditValue(""); };
  const commitEdit = () => {
    const name = editValue.trim();
    if (!name || !editingId) { cancelEdit(); return; }
    if (schools.some((s) => s.name === name && s.id !== editingId)) {
      cancelEdit(); return;
    }
    setSchools(schools.map((s) => (s.id === editingId ? { ...s, name } : s)));
    cancelEdit();
  };

  const handleDragStart = (i) => setDragIdx(i);
  const handleDragOver = (e, i) => { e.preventDefault(); setHoverIdx(i); };
  const handleDrop = () => {
    if (dragIdx === null || hoverIdx === null || dragIdx === hoverIdx) {
      setDragIdx(null); setHoverIdx(null); return;
    }
    const next = [...schools];
    const [moved] = next.splice(dragIdx, 1);
    next.splice(hoverIdx, 0, moved);
    setSchools(next);
    setDragIdx(null); setHoverIdx(null);
  };

  return h("section", { className: "relative" },
    h(PanelHeader, {
      icon: h(Target, { className: "h-4 w-4" }),
      label: "PARTICIPANT REGISTRY",
      sublabel: "登録・並べ替え・一括インポート",
    }),
    h("div", { className: "glass mt-3 p-4 sm:p-5" },
      /* 入力行 */
      h("div", { className: "flex flex-col gap-2 sm:flex-row" },
        h("input", {
          value: input,
          onChange: (e) => setInput(e.target.value),
          onKeyDown: (e) => e.key === "Enter" && addOne(),
          disabled,
          placeholder: "高校名を入力（例：西条農業）",
          className: "w-full flex-1 rounded-md border border-cyan-500/30 bg-black/40 px-4 py-3 font-jp text-sm text-cyan-100 placeholder-cyan-300/30 outline-none transition focus:border-cyan-400 focus:shadow-[0_0_0_4px_rgba(0,240,255,0.15)]",
        }),
        h("div", { className: "flex gap-2" },
          h("button", {
            onClick: addOne,
            disabled: disabled || !input.trim(),
            className: "neon-btn neon-btn--cyan flex flex-1 items-center justify-center gap-1.5 sm:flex-none",
          },
            h(Plus, { className: "h-4 w-4" }),
            " ADD"
          ),
          h("button", {
            onClick: () => setShowBulk(v => !v),
            disabled,
            className: "neon-btn neon-btn--magenta flex flex-1 items-center justify-center gap-1.5 sm:flex-none",
          },
            h(Upload, { className: "h-4 w-4" }),
            " BULK"
          )
        )
      ),

      /* 一括追加 */
      h(AnimatePresence, null,
        showBulk && h(motion.div, {
          initial: { height: 0, opacity: 0 },
          animate: { height: "auto", opacity: 1 },
          exit: { height: 0, opacity: 0 },
          transition: { duration: 0.25 },
          className: "overflow-hidden",
        },
          h("div", { className: "mt-3 rounded-md border border-pink-500/30 bg-black/40 p-3" },
            h("div", { className: "mb-2 font-mono text-[10px] tracking-[0.3em] text-pink-300/80" },
              "MULTI-LINE INPUT ▸ 改行 / カンマ / 読点 / タブ で区切り"
            ),
            h("textarea", {
              value: bulk,
              onChange: (e) => setBulk(e.target.value),
              rows: 4,
              placeholder: "松山東高校\n新居浜工業高校, 今治南高校\n...",
              className: "w-full rounded bg-black/60 p-2 font-jp text-sm text-pink-100 outline-none",
            }),
            h("div", { className: "mt-2 flex justify-end" },
              h("button", {
                onClick: addBulk,
                className: "neon-btn neon-btn--magenta",
              }, "IMPORT ALL")
            )
          )
        )
      ),

      /* 一覧 */
      h("div", { className: "mt-4" },
        schools.length === 0 ? h(EmptyState) :
          h("ul", {
            className: "space-y-1.5 max-h-[50vh] overflow-y-auto pr-1",
            onDragEnd: handleDrop,
          },
            h(AnimatePresence, null,
              ...schools.map((s, i) => {
                const isEditing = editingId === s.id;
                return h(motion.li, {
                  key: s.id,
                  layout: true,
                  initial: { opacity: 0, x: -20 },
                  animate: { opacity: 1, x: 0 },
                  exit: { opacity: 0, x: 20, transition: { duration: 0.15 } },
                  draggable: !disabled && !isEditing,
                  onDragStart: () => handleDragStart(i),
                  onDragOver: (e) => handleDragOver(e, i),
                  className: `group relative flex items-center gap-3 rounded border px-3 py-2.5 transition-all ${
                    isEditing
                      ? "border-cyan-400 bg-cyan-400/5"
                      : hoverIdx === i && dragIdx !== null
                      ? "border-cyan-400 bg-cyan-400/10"
                      : "border-white/10 bg-white/[0.02] hover:border-cyan-500/40 hover:bg-cyan-500/5"
                  }`,
                },
                  h(GripVertical, {
                    className: `hidden h-4 w-4 sm:block ${isEditing ? "text-white/10" : "cursor-grab text-white/30 group-hover:text-cyan-400"}`
                  }),
                  /* モバイル用 上下並べ替え */
                  h("div", { className: "flex flex-col leading-none sm:hidden" },
                    h("button", {
                      onClick: () => move(s.id, -1),
                      disabled: disabled || isEditing || i === 0,
                      "aria-label": "上へ",
                      className: "text-white/40 transition hover:text-cyan-300 disabled:opacity-20",
                    }, h(ArrowUp, { className: "h-3.5 w-3.5" })),
                    h("button", {
                      onClick: () => move(s.id, 1),
                      disabled: disabled || isEditing || i === schools.length - 1,
                      "aria-label": "下へ",
                      className: "text-white/40 transition hover:text-cyan-300 disabled:opacity-20",
                    }, h(ArrowDown, { className: "h-3.5 w-3.5" }))
                  ),
                  h("span", { className: "font-mono text-[10px] tracking-wider text-cyan-400/60" },
                    `#${String(i + 1).padStart(2, "0")}`
                  ),
                  isEditing
                    ? h("input", {
                        autoFocus: true,
                        value: editValue,
                        onChange: (e) => setEditValue(e.target.value),
                        onKeyDown: (e) => {
                          if (e.key === "Enter") commitEdit();
                          else if (e.key === "Escape") cancelEdit();
                        },
                        onBlur: commitEdit,
                        className: "flex-1 rounded-sm border border-cyan-400/60 bg-black/50 px-2 py-1 font-jp text-[15px] tracking-wide text-cyan-100 outline-none focus:shadow-[0_0_0_3px_rgba(0,240,255,0.15)]",
                      })
                    : h("span", {
                        className: "flex-1 font-jp text-[15px] tracking-wide text-white cursor-text",
                        onDoubleClick: () => startEdit(s),
                        title: "ダブルクリックで編集",
                      }, s.name),
                  isEditing
                    ? h("button", {
                        onMouseDown: (e) => e.preventDefault(),
                        onClick: commitEdit,
                        className: "text-cyan-300 transition hover:text-cyan-200",
                        "aria-label": "保存",
                      }, h(Check, { className: "h-4 w-4" }))
                    : h("button", {
                        onClick: () => startEdit(s),
                        disabled,
                        className: "text-white/30 transition hover:text-cyan-400",
                        "aria-label": "編集",
                      }, h(Pencil, { className: "h-4 w-4" })),
                  h("button", {
                    onClick: () => { if (isEditing) cancelEdit(); else remove(s.id); },
                    onMouseDown: isEditing ? (e) => e.preventDefault() : undefined,
                    disabled,
                    className: "text-white/30 transition hover:text-pink-400",
                    "aria-label": isEditing ? "キャンセル" : "削除",
                  },
                    h(X, { className: "h-4 w-4" })
                  )
                );
              })
            )
          )
      )
    )
  );
};

/* ============================================================================
 * Slot Engine
 * ========================================================================= */
const ROW_HEIGHT = 92;
const VISIBLE = 5;

const SlotRow = ({ name, isStopped, drumIndex }) => {
  const rowRef = useRef(null);
  const [tilt, setTilt] = useState(0);
  const [opacity, setOpacity] = useState(1);

  useEffect(() => {
    let raf;
    const update = () => {
      if (rowRef.current) {
        const rect = rowRef.current.getBoundingClientRect();
        const parent = rowRef.current.closest("[data-slot-viewport]")?.getBoundingClientRect();
        if (parent) {
          const center = parent.top + parent.height / 2;
          const offset = rect.top + rect.height / 2 - center;
          const norm = Math.max(-1, Math.min(1, offset / (parent.height / 2)));
          setTilt(norm * 55);
          setOpacity(1 - Math.abs(norm) * 0.75);
        }
      }
      raf = requestAnimationFrame(update);
    };
    raf = requestAnimationFrame(update);
    return () => cancelAnimationFrame(raf);
  }, []);

  const colorSet = [NEON.cyan, NEON.magenta, NEON.yellow, NEON.lime];
  const color = colorSet[drumIndex % colorSet.length];

  return h("div", {
    ref: rowRef,
    style: {
      transform: `rotateX(${tilt}deg)`,
      opacity,
      transformStyle: "preserve-3d",
    },
    className: "font-display text-center text-2xl font-bold tracking-wider transition-colors",
  },
    h("span", {
      className: "font-jp",
      style: {
        color: isStopped && Math.abs(tilt) < 8 ? color : "#ffffff",
        textShadow:
          isStopped && Math.abs(tilt) < 8
            ? `0 0 20px ${color}, 0 0 40px ${color}66`
            : "0 0 12px rgba(0,240,255,0.3)",
      }
    }, name)
  );
};

const SlotDrum = ({ pool, isSpinning, resultName, onStopped, drumIndex }) => {
  const y = useMotionValue(0);
  const [localPhase, setLocalPhase] = useState("idle");
  const { play } = useSoundEngine();

  const reel = useMemo(() => {
    if (pool.length === 0) return [];
    const repeats = Math.max(8, Math.ceil(60 / pool.length));
    return Array.from({ length: repeats }, () => pool).flat();
  }, [pool]);

  useEffect(() => {
    if (!isSpinning) return;
    let mounted = true;
    setLocalPhase("spinning");
    play("spin");

    const baseSpinDistance = (reel.length * ROW_HEIGHT) * 1.2 + drumIndex * ROW_HEIGHT * 4;
    const spinControls = animate(y, -baseSpinDistance, {
      duration: 1.2 + drumIndex * 0.15,
      ease: [0.22, 0.68, 0.27, 1.0],
    });

    spinControls.then(() => {
      if (!mounted) return;
      setLocalPhase("decelerating");
      const targetIndex = pool.findIndex((s) => s.name === resultName);
      if (targetIndex < 0) return;

      const currentY = y.get();
      const currentSlot = Math.abs(currentY / ROW_HEIGHT);
      const nextLap = Math.ceil(currentSlot / pool.length) + 1;
      const finalSlot = nextLap * pool.length + targetIndex;
      const finalY = -(finalSlot * ROW_HEIGHT);

      let lastSlot = -1;
      const finalControls = animate(y, finalY, {
        duration: 0.7,
        ease: [0.16, 1, 0.3, 1],
        onUpdate: (v) => {
          const slot = Math.floor(Math.abs(v) / ROW_HEIGHT);
          if (slot !== lastSlot) { lastSlot = slot; play("tick"); }
        },
      });
      finalControls.then(() => {
        if (!mounted) return;
        setLocalPhase("stopped");
        play("stop");
        onStopped?.();
      });
    });

    return () => {
      mounted = false;
      spinControls.stop();
    };
  }, [isSpinning, resultName]);

  const isStopped = localPhase === "stopped";

  return h("div", { className: "relative", style: { height: ROW_HEIGHT * VISIBLE } },
    /* 上下グラデマスク */
    h("div", {
      className: "pointer-events-none absolute inset-0 z-20",
      style: {
        background:
          "linear-gradient(180deg, rgba(5,6,14,1) 0%, rgba(5,6,14,0.4) 20%, rgba(5,6,14,0) 40%, rgba(5,6,14,0) 60%, rgba(5,6,14,0.4) 80%, rgba(5,6,14,1) 100%)",
      }
    }),
    /* ウィナーライン */
    h("div", {
      className: "pointer-events-none absolute left-0 right-0 z-10",
      style: { top: ROW_HEIGHT * 2, height: ROW_HEIGHT },
    },
      h("div", { className: "absolute inset-x-0 top-0 h-px bg-gradient-to-r from-transparent via-cyan-300 to-transparent" }),
      h("div", { className: "absolute inset-x-0 bottom-0 h-px bg-gradient-to-r from-transparent via-cyan-300 to-transparent" }),
      h(motion.div, {
        className: "absolute inset-0",
        animate: {
          boxShadow: isStopped
            ? ["inset 0 0 0 2px rgba(245,255,61,0.9)", "inset 0 0 40px rgba(245,255,61,0.3)"]
            : "inset 0 0 20px rgba(0,240,255,0.18)",
        },
        transition: { duration: 0.3 },
      })
    ),
    /* 回転ドラム */
    h(motion.div, { style: { y }, className: "relative", },
      h("div", { style: { paddingTop: ROW_HEIGHT * 2 } }),
      ...reel.map((s, i) =>
        h("div", {
          key: `${s.id}-${i}`,
          className: "flex items-center justify-center",
          style: { height: ROW_HEIGHT, perspective: "600px" },
        },
          h(SlotRow, { name: s.name, isStopped, drumIndex })
        )
      )
    )
  );
};

/* ============================================================================
 * Slot Section
 * ========================================================================= */
const SlotSection = ({ schools, ranking, currentIdx, onFinishPosition, isActive }) => {
  const currentTarget = ranking[currentIdx];
  const [shock, setShock] = useState(false);
  const { play } = useSoundEngine();

  const handleStopped = () => {
    setShock(true);
    play("impact");
    setTimeout(() => setShock(false), 700);
    setTimeout(() => onFinishPosition(), 350);
  };

  return h("section", { className: "relative" },
    h(PanelHeader, {
      icon: h(Zap, { className: "h-4 w-4" }),
      label: "KINETIC SLOT ENGINE",
      sublabel: isActive ? `DRAWING POSITION #${currentIdx + 1}` : "STANDBY",
    }),
    h("div", { className: "glass relative mt-3 overflow-hidden p-4 sm:p-6" },
      h("div", { className: "absolute left-0 top-0 h-full w-[3px] bg-gradient-to-b from-cyan-400 via-pink-500 to-yellow-300 opacity-80" }),
      h("div", { className: "absolute right-0 top-0 h-full w-[3px] bg-gradient-to-b from-yellow-300 via-pink-500 to-cyan-400 opacity-80" }),
      h("div", { className: "mb-4 flex flex-wrap items-center justify-between gap-2 sm:mb-5" },
        h(PositionBadge, { position: currentIdx + 1, total: schools.length }),
        h("div", { className: "font-mono text-[10px] tracking-[0.3em] text-cyan-300/70" },
          `TARGET ▸ ${currentTarget ? "LOCKED" : "—"}`
        )
      ),
      h("div", { "data-slot-viewport": true, className: "relative" },
        currentTarget && h(SlotDrum, {
          key: currentIdx,
          pool: schools,
          isSpinning: isActive,
          resultName: currentTarget.name,
          onStopped: handleStopped,
          drumIndex: currentIdx,
        })
      )
    ),
    h(Shockwave, {
      trigger: shock,
      color: currentIdx === 0 ? NEON.yellow : currentIdx === 1 ? NEON.cyan : NEON.magenta,
    })
  );
};

/* ============================================================================
 * Full-Screen Order Display（全画面で発表順を表示）
 * ========================================================================= */
const FullScreenOrderDisplay = ({ ranking, onClose, onExportCsv }) => {
  const palette = [NEON.cyan, "#6AE1FF", "#9FCFFF", "#C4BFFF", NEON.magenta, "#FF7BB8", "#FFB05E", NEON.yellow];
  const accent = (i) => palette[i % palette.length];

  // 校数に応じてグリッドの列数を段階的に（モバイルでは常に1列）
  const gridCols = ranking.length <= 4
    ? "grid-cols-1"

    : ranking.length <= 15

  return h(motion.div, {

      h("div", { className: "mx-auto flex max-w-[1600px] flex-wrap items-center justify-between gap-3 px-4 py-3 sm:px-8 sm:py-5" },
        h("div", { className: "min-w-0" },

        h("div", { className: "flex flex-wrap items-center gap-2 sm:gap-3" },
          onExportCsv && h("button", {
            onClick: onExportCsv,
            className: "neon-btn neon-btn--magenta flex items-center gap-2",

            h(Download, { className: "h-4 w-4" }),
            "CSV EXPORT"
          ),
          h("button", {
            onClick: onClose,

    /* メイン：全順位グリッド */
    h("div", { className: "relative z-10 mx-auto max-w-[1600px] px-4 py-6 sm:px-8 sm:py-10" },
      h("div", {
        className: `grid gap-3 sm:gap-4 ${gridCols}`,
      },
        ...ranking.map((s, i) =>
          h(motion.div, {
            key: s.id,
            initial: { opacity: 0, y: 30, scale: 0.92 },
            animate: { opacity: 1, y: 0, scale: 1 },
            transition: {
              type: "spring",
              stiffness: 180,
              damping: 20,

            },
            className: "relative overflow-hidden rounded-lg border border-white/10 bg-gradient-to-br from-white/[0.04] to-transparent p-4 sm:p-5 md:p-6",
            style: {
              boxShadow: `inset 4px 0 0 ${accent(i)}, 0 0 0 1px rgba(255,255,255,0.03)`,

/* ============================================================================
 * Modal (共通)
 * ========================================================================= */
const Modal = ({ onClose, children, maxWidthClass = "max-w-md" }) => {
  useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") onClose?.(); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [onClose]);

  return h(motion.div, {
    className: "fixed inset-0 z-[80] flex items-center justify-center p-4",
    initial: { opacity: 0 },
    animate: { opacity: 1 },
    exit: { opacity: 0 },
  },
    h("div", {
      className: "absolute inset-0 bg-black/70 backdrop-blur-sm",
      onClick: onClose,
    }),
    h(motion.div, {
      className: `glass relative w-full ${maxWidthClass} p-5 sm:p-6`,
      initial: { y: 20, opacity: 0, scale: 0.96 },
      animate: { y: 0, opacity: 1, scale: 1 },
      exit: { y: 20, opacity: 0, scale: 0.96 },
      transition: { type: "spring", stiffness: 260, damping: 22 },
    }, children)
  );
};

/* ============================================================================
 * SavedDraftsPanel
 * ========================================================================= */
const SavedDraftsPanel = ({ saved, onDelete, onRename, onExportAll, onExportOne }) => {
  const [editingId, setEditingId] = useState(null);
  const [editValue, setEditValue] = useState("");
  const [expandedId, setExpandedId] = useState(null);

  const startEdit = (d) => { setEditingId(d.id); setEditValue(d.name); };
  const cancelEdit = () => { setEditingId(null); setEditValue(""); };
  const commitEdit = () => {
    const n = editValue.trim();
    if (!n || !editingId) { cancelEdit(); return; }
    onRename(editingId, n);
    cancelEdit();
  };

  const confirmDelete = (d) => {
    if (typeof window !== "undefined" && window.confirm(`「${d.name}」を削除しますか？`)) {
      onDelete(d.id);
    }
  };

  const fmtDate = (iso) => {
    const d = new Date(iso);
    if (isNaN(d.getTime())) return iso;
    return d.toLocaleString("ja-JP", { year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });
  };

  return h("section", { className: "relative" },
    h(PanelHeader, {
      icon: h(Archive, { className: "h-4 w-4" }),
      label: "SAVED DRAFTS",
      sublabel: `${saved.length} DRAFT(S) — 保存された発表順のアーカイブ`,
    }),
    h("div", { className: "glass mt-3 p-4 sm:p-5" },
      h("div", { className: "mb-3 flex flex-wrap items-center justify-between gap-2" },
        h("div", { className: "font-mono text-[10px] tracking-wider text-white/50" },
          saved.length === 0
            ? "ドラフト完了後に「SAVE」で結果を保存できます"
            : `TOTAL ${saved.length} 件 — クリックで順番を展開`
        ),
        h("button", {
          onClick: onExportAll,
          disabled: saved.length === 0,
          className: "neon-btn neon-btn--yellow flex items-center gap-1.5",
        },
          h(Download, { className: "h-4 w-4" }),
          "一括 CSV"
        )
      ),
      saved.length === 0
        ? h("div", { className: "flex flex-col items-center justify-center rounded border border-dashed border-cyan-500/20 py-10 text-center" },
            h(Archive, { className: "mb-2 h-6 w-6 text-cyan-400/40" }),
            h("p", { className: "font-mono text-xs tracking-wider text-white/40" },
              "NO SAVED DRAFTS — まだ保存されたドラフトはありません"
            )
          )
        : h("ul", { className: "space-y-2 max-h-[50vh] overflow-y-auto pr-1" },
            h(AnimatePresence, null,
              ...saved.map((d) => {
                const isEditing = editingId === d.id;
                const isExpanded = expandedId === d.id;
                return h(motion.li, {
                  key: d.id,
                  layout: true,
                  initial: { opacity: 0, y: -8 },
                  animate: { opacity: 1, y: 0 },
                  exit: { opacity: 0, y: -8, transition: { duration: 0.15 } },
                  className: "rounded border border-white/10 bg-white/[0.02] transition hover:border-cyan-500/30",
                },
                  h("div", { className: "flex flex-wrap items-center gap-2 px-3 py-2.5 sm:gap-3" },
                    /* 左: 名前 / 日時 / 件数 */
                    h("div", { className: "min-w-0 flex-1" },
                      isEditing
                        ? h("input", {
                            autoFocus: true,
                            value: editValue,
                            onChange: (e) => setEditValue(e.target.value),
                            onKeyDown: (e) => {
                              if (e.key === "Enter") commitEdit();
                              else if (e.key === "Escape") cancelEdit();
                            },
                            onBlur: commitEdit,
                            className: "w-full rounded border border-cyan-400/60 bg-black/50 px-2 py-1 font-jp text-sm text-cyan-100 outline-none",
                          })
                        : h("button", {
                            onClick: () => setExpandedId(isExpanded ? null : d.id),
                            className: "block w-full text-left truncate font-jp text-sm font-bold text-white hover:text-cyan-300",
                            title: "クリックで順番を展開",
                          }, d.name),
                      h("div", { className: "mt-0.5 flex items-center gap-2 font-mono text-[10px] tracking-wider text-white/40" },
                        h("span", null, fmtDate(d.createdAt)),
                        h("span", { className: "text-cyan-400/50" }, "▸"),
                        h("span", null, `${d.ranking.length} 校`)
                      )
                    ),
                    /* 右: 操作ボタン */
                    h("div", { className: "flex shrink-0 items-center gap-1" },
                      isEditing
                        ? h("button", {
                            onMouseDown: (e) => e.preventDefault(),
                            onClick: commitEdit,
                            "aria-label": "保存",
                            className: "p-1.5 text-cyan-300 transition hover:text-cyan-200",
                          }, h(Check, { className: "h-4 w-4" }))
                        : h("button", {
                            onClick: () => startEdit(d),
                            "aria-label": "名前を編集",
                            className: "p-1.5 text-white/40 transition hover:text-cyan-300",
                          }, h(Pencil, { className: "h-4 w-4" })),
                      h("button", {
                        onClick: () => onExportOne(d),
                        "aria-label": "CSV 出力",
                        title: "CSV",
                        className: "p-1.5 text-white/40 transition hover:text-yellow-300",
                      }, h(Download, { className: "h-4 w-4" })),
                      h("button", {
                        onClick: () => confirmDelete(d),
                        "aria-label": "削除",
                        className: "p-1.5 text-white/40 transition hover:text-pink-400",
                      }, h(Trash2, { className: "h-4 w-4" }))
                    )
                  ),
                  /* 展開時: 順番リスト */
                  isExpanded && !isEditing && h(motion.div, {
                    initial: { height: 0, opacity: 0 },
                    animate: { height: "auto", opacity: 1 },
                    exit: { height: 0, opacity: 0 },
                    className: "overflow-hidden border-t border-white/5",
                  },
                    h("ol", { className: "grid gap-1 px-3 py-3 sm:grid-cols-2" },
                      ...d.ranking.map((s, i) =>
                        h("li", {
                          key: `${d.id}-${s.id || i}`,
                          className: "flex items-center gap-2 font-jp text-xs",
                        },
                          h("span", { className: "min-w-[2.25rem] font-mono text-[10px] tracking-wider text-cyan-400/70" },
                            String(i + 1).padStart(2, "0")),
                          h("span", { className: "truncate text-white/90" }, s.name)
                        )
                      )
                    )
                  )
                );
              })
            )
          )
    )
  );
};

/* ============================================================================
 * Root App
 * ========================================================================= */
const SAMPLE = [
  "西条農業", "東予総合", "丹原", "今治南", "伊予農業",
  "愛大附", "上浮穴", "大洲", "大洲農業", "川之石",
  "野村", "宇和", "北宇和", "三間", "南宇和",
];

const App = () => {
  const [schools, setSchools] = useState(() => {
    const saved = loadSchools();
    if (saved !== null) return saved;
    return SAMPLE.map((name) => ({ id: makeId(), name }));
  });
  const [phase, setPhase] = useState("setup");
  const [ranking, setRanking] = useState([]);
  const [currentIdx, setCurrentIdx] = useState(0);
  const [showFullScreen, setShowFullScreen] = useState(false);
  const [muted, setMuted] = useState(() => loadMuted());
  const [savedDrafts, setSavedDrafts] = useState(() => loadSavedDrafts());
  const [showSaveDialog, setShowSaveDialog] = useState(false);

  // Persist schools
  useEffect(() => { saveSchools(schools); }, [schools]);

  // Persist saved drafts
  useEffect(() => { saveSavedDrafts(savedDrafts); }, [savedDrafts]);

  // Sync mute state with audio engine
  useEffect(() => {
    setSoundMuted(muted);
    saveMuted(muted);
  }, [muted]);

  // Play fanfare when all positions are decided
  useEffect(() => {
    if (phase !== "finished") return;
    const id = setTimeout(() => playSfx("fanfare"), 400);
    return () => clearTimeout(id);
  }, [phase]);

  const revealed = ranking.slice(0, currentIdx);
  const statusLabel =
    phase === "setup" ? "READY" : phase === "drawing" ? "DRAWING" : "COMPLETE";

  const start = () => {
    if (schools.length < 2) return;
    const r = generateRanking(schools);
    setRanking(r);
    setCurrentIdx(0);
    setPhase("drawing");
  };

  const onFinishPosition = () => {
    const next = currentIdx + 1;
    if (next >= ranking.length) {
      setCurrentIdx(next);
      setPhase("finished");
      // 全順番決定後、少し余韻をおいて全画面表示
      setTimeout(() => setShowFullScreen(true), 900);
    } else {
      setCurrentIdx(next);
    }
  };

  const reset = () => {
    setRanking([]);
    setCurrentIdx(0);
    setPhase("setup");
    setShowFullScreen(false);
  };

  const exportCsv = () => {
    if (ranking.length === 0) return;
    downloadRankingCsv(ranking);
  };

  // デフォルト名：「第N回 ドラフト」で軽くサジェスト（既存に第N回があれば + 1）
  const suggestedName = useMemo(() => {
    const nums = savedDrafts
      .map((d) => {
        const m = d.name.match(/第\s*(\d+)\s*回/);
        return m ? parseInt(m[1], 10) : 0;
      })
      .filter((n) => n > 0);
    const next = (nums.length ? Math.max(...nums) : 0) + 1;
    return `第${next}回 発表`;
  }, [savedDrafts]);

  const saveDraft = (name) => {
    const entry = {
      id: makeId(),
      name: name.trim() || `ドラフト ${new Date().toLocaleString("ja-JP")}`,
      createdAt: new Date().toISOString(),
      ranking: ranking.map((s) => ({ id: s.id, name: s.name })),
    };
    setSavedDrafts([entry, ...savedDrafts]);
    setShowSaveDialog(false);
  };

  const deleteDraft = (id) => {
    setSavedDrafts(savedDrafts.filter((d) => d.id !== id));
  };

  const renameDraft = (id, name) => {
    setSavedDrafts(savedDrafts.map((d) => (d.id === id ? { ...d, name } : d)));
  };

  const exportAllSavedCsv = () => {
    if (savedDrafts.length === 0) return;
    downloadAllSavedCsv(savedDrafts);
  };

  const exportOneSavedCsv = (d) => {
    downloadRankingCsv(d.ranking, d.name);
  };

  return h("div", { className: "relative min-h-screen overflow-x-hidden bg-[#05060E] text-white" },
    h(Backdrop),
    h(HeaderHUD, {
      schoolCount: schools.length,
      statusLabel,
      muted,
      onToggleMute: () => setMuted((m) => !m),
    }),
    h("main", { className: "relative z-10 mx-auto max-w-6xl px-4 py-6 sm:px-6 sm:py-8" },
      /* タイトルブロック */
      h("div", { className: "mb-6 flex flex-col items-start gap-4 sm:mb-10 sm:gap-6 md:flex-row md:items-end md:justify-between" },
        h("div", null,
          h(motion.div, {
            initial: { opacity: 0, y: 20 },
            animate: { opacity: 1, y: 0 },
            className: "font-mono text-[10px] tracking-[0.3em] text-cyan-400/70 sm:text-xs sm:tracking-[0.4em]",
          }, "▸ AGRICULTURE CLUB PRESENTATION DRAFT"),
          h(motion.h1, {
            initial: { opacity: 0, y: 30 },
            animate: { opacity: 1, y: 0 },
            transition: { delay: 0.08 },
            className: "font-jp font-black leading-[0.95] tracking-tight text-[32px] sm:text-[44px] md:text-[64px]",
            style: {
              background:
                "linear-gradient(180deg, #ffffff 0%, #ffffff 50%, #00F0FF 70%, #FF2E9A 100%)",
              WebkitBackgroundClip: "text",
              WebkitTextFillColor: "transparent",
              filter: "drop-shadow(0 4px 30px rgba(0,240,255,0.25))",
            }
          }, "農業クラブ", h("br"), "発表順番決め", h("br"), "ルーレット"),
          h(motion.div, {
            initial: { opacity: 0 },
            animate: { opacity: 1 },
            transition: { delay: 0.2 },
            className: "mt-3 font-mono text-[10px] tracking-[0.2em] text-white/40 sm:text-xs sm:tracking-[0.3em]",
          }, "PRESENTATION ORDER RANDOMIZER")
        ),
        h("div", { className: "flex flex-wrap items-center gap-2 sm:gap-3" },
          phase === "setup" && h(motion.button, {
            whileHover: { scale: 1.02 },
            whileTap: { scale: 0.97 },
            onClick: start,
            disabled: schools.length < 2,
            className: "neon-btn neon-btn--yellow flex items-center gap-2",
          },
            h(Play, { className: "h-4 w-4 fill-current" }),
            "START DRAFT"
          ),
          (phase === "drawing" || phase === "finished") && h(motion.button, {
            whileHover: { scale: 1.02 },
            whileTap: { scale: 0.97 },
            onClick: reset,
            className: "neon-btn neon-btn--cyan flex items-center gap-2",
          },
            h(RotateCcw, { className: "h-4 w-4" }),
            "NEW DRAFT"
          ),
          phase === "finished" && h(motion.button, {
            whileHover: { scale: 1.02 },
            whileTap: { scale: 0.97 },
            onClick: () => setShowSaveDialog(true),
            className: "neon-btn neon-btn--yellow flex items-center gap-2",
          },
            h(Save, { className: "h-4 w-4" }),
            "SAVE RESULT"
          ),
          phase === "finished" && h(motion.button, {
            whileHover: { scale: 1.02 },
            whileTap: { scale: 0.97 },
            onClick: () => setShowFullScreen(true),
            className: "neon-btn neon-btn--cyan flex items-center gap-2",
          },
            h(Maximize2, { className: "h-4 w-4" }),
            "全画面表示"
          ),
          phase === "finished" && h(motion.button, {
            whileHover: { scale: 1.02 },
            whileTap: { scale: 0.97 },
            onClick: exportCsv,
            className: "neon-btn neon-btn--magenta flex items-center gap-2",
          },
            h(Download, { className: "h-4 w-4" }),
            "CSV EXPORT"
          )
        )
      ),
      /* メインレイアウト */
      h("div", { className: "grid gap-6 sm:gap-8 lg:grid-cols-[1fr_1.1fr]" },
        h("div", null,
          phase === "setup"
            ? h(SchoolRegistry, { schools, setSchools, disabled: false })
            : h(SlotSection, {
                schools,
                ranking,
                currentIdx: Math.min(currentIdx, ranking.length - 1),
                onFinishPosition,
                isActive: phase === "drawing" && currentIdx < ranking.length,
              })
        ),
        h("div", null,
          h(ResultsBoard, { revealed, total: ranking.length || schools.length })
        )
      ),
      /* 保存済みドラフト */
      h("div", { className: "mt-8 sm:mt-10" },
        h(SavedDraftsPanel, {
          saved: savedDrafts,
          onDelete: deleteDraft,
          onRename: renameDraft,
          onExportAll: exportAllSavedCsv,
          onExportOne: exportOneSavedCsv,
        })
      ),
      /* フッター */
      h("footer", { className: "mt-10 flex flex-col items-start justify-between gap-2 border-t border-white/5 pt-6 font-mono text-[9px] tracking-[0.2em] text-white/30 sm:mt-16 sm:flex-row sm:items-center sm:text-[10px] sm:tracking-[0.3em]" },
        h("div", null, "© KINETIC::DRAFT — BUILT WITH REACT + FRAMER MOTION"),
        h("div", null, "SYS.READY")
      )
    ),

    /* 全画面表示オーバーレイ */
    h(AnimatePresence, null,
      showFullScreen && h(FullScreenOrderDisplay, {
        ranking,
        onClose: () => setShowFullScreen(false),
        onExportCsv: exportCsv,
      })
    ),

    /* 保存ダイアログ */
    h(AnimatePresence, null,
      showSaveDialog && h(SaveDraftDialog, {
        defaultName: suggestedName,
        onSave: saveDraft,
        onClose: () => setShowSaveDialog(false),
      })
    )
  );
};

// --- エラーを画面に表示する安全装置 ---
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { err: null }; }
  static getDerivedStateFromError(err) { return { err }; }
  componentDidCatch(err, info) { console.error("[KineticDraft] ", err, info); }
  render() {
    if (this.state.err) {
      return h("div", {
        style: {
          padding: "24px", margin: "24px", borderRadius: "8px",
          background: "#200", color: "#fcc", fontFamily: "monospace",
          border: "1px solid #f55", whiteSpace: "pre-wrap"
        }
      },
        h("div", { style: { fontWeight: 700, marginBottom: 12, color: "#f88" } }, "⚠ RUNTIME ERROR"),
        String(this.state.err?.stack || this.state.err)
      );
    }
    return this.props.children;
  }
}

createRoot(document.getElementById("root")).render(h(ErrorBoundary, null, h(App)));
</script>
</body>
</html>
